info:
  app:
    name: simulacert
    version: 1.1.0-STAGING
    description: Sistema de Simulados AWS - Monólito Modular
    architecture: modular-monolith

spring:
  aop:
    proxy-target-class: true # Enable CGLIB proxies to allow proxying of classes without interfaces
  profiles:
    active: prod
  jackson:
      default-property-inclusion: non_null
  application:
    name: simulacert

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false
      sort:
        sort-parameter: sort

  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

  cloud:
    openfeign:
      enabled: true

server:
  port: 8080


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui
    operations-sorter: method
  writer-with-order-by-keys: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
  file:
    name: logs/simulacert.log

app:
  rate-limit:
    enabled: true
    default-config:
      capacity: 100
      refill-tokens: 100
      refill-period: 60s
    unknown:
      capacity: 40
      refill-tokens: 40
      refill-period: 60s
    auth:
      capacity: 10
      refill-tokens: 10
      refill-period: 30s
    expensive:
      capacity: 5
      refill-tokens: 5
      refill-period: 1h
    llm:
      capacity: 10
      refill-tokens: 10
      refill-period: 2h

  llm:
    openai:
      enabled: true
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4.1-mini  # or gpt-4, gpt-4-turbo, gpt-3.5-turbo

feign:
  client:
    config:
      default:
        connectTimeout: ${FEIGN_CLIENT_CONNECT_TIMEOUT_MS:5000}
        readTimeout: ${FEIGN_CLIENT_READ_TIMEOUT_MS:60000}
        loggerLevel: ${FEIGN_CLIENT_LOGGER_LEVEL:basic}
        retryer:
          period: ${FEIGN_RETRYER_PERIOD_MS:100}
          maxPeriod: ${FEIGN_RETRYER_MAX_PERIOD_MS:1000}
          maxAttempts: ${FEIGN_RETRYER_MAX_ATTEMPTS:2}
        followRedirects: false
      openai:
        url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
        connectTimeout: ${OPENAI_FEIGN_CONNECT_TIMEOUT_MS:2000}
        readTimeout: ${OPENAI_FEIGN_READ_TIMEOUT_MS:60000}
        loggerLevel: ${OPENAI_FEIGN_LOGGER_LEVEL:basic}

