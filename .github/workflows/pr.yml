name: CI

on:
  pull_request:
    branches:
      - release/*
  push:
    branches:
      - release/*

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Prepare Docker context (app.jar)
        run: cp app/build/libs/*.jar app.jar

      - name: Upload build artifact (app.jar)
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: app.jar

      - name: Upload test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/test/**