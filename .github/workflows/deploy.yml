name: Master release build & deploy

on:
  push:
    branches: ["master"]

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build & Test
        run: ./gradlew build

      - name: Build deployable JAR
        run: ./gradlew :app:bootJar

      - name: Prepare deploy artifact (app.jar)
        run: cp app/build/libs/app.jar app.jar

      - name: Upload deploy artifact (app.jar)
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: app.jar

      - name: Upload test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/test/**

  codeql:
    name: CodeQL Analyze
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build (no tests)
        run: ./gradlew build -x test

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
  deploy:
    name: Deploy (ECR)
    needs: [build-and-test, codeql]
    if: ${{ needs.codeql.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download deploy artifact (app.jar)
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Verify deploy artifact
        run: ls -lah app.jar

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login no ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image variables
        id: vars
        shell: bash
        run: |
          echo "REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_NAME=simulacert-api" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.REGISTRY }}/${{ steps.vars.outputs.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=release
            type=raw,value=prod

      - name: Build e push (ARM64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
